<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Saugiai atkurkite arba pakeiskite Atminimas paskyros slaptažodį.">
<meta name="robots" content="noindex,nofollow">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="assets/atminimas-candle.jpg" type="image/jpeg">
<title>Atkurti slaptažodį - Atminimas</title>
<link rel="stylesheet" href="css/styles.css?v=20260715-4">
</head>
<body data-loading>
<div class="site-shell">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="index.html"><span class="brand__mark"><img src="assets/atminimas-candle.jpg" alt=""></span><span class="brand__name">Atminimas</span></a>
      <nav class="site-nav"><a href="prisijungti.html">Prisijungti</a></nav>
    </div>
  </header>
  <main class="site-main">
    <section class="client-access auth-page" aria-labelledby="password-title">
      <div class="client-access__intro">
        <p class="eyebrow">Paskyros saugumas</p>
        <h1 id="password-title">Atkurti slaptažodį</h1>
        <p id="password-intro">Įrašykite paskyros el. paštą ir atsiųsime saugią slaptažodžio atkūrimo nuorodą.</p>
      </div>

      <form class="auth-form" id="password-request-form">
        <label>El. paštas<input type="email" name="email" autocomplete="email" required></label>
        <button class="button" type="submit">Siųsti atkūrimo nuorodą</button>
      </form>

      <form class="auth-form" id="password-update-form" hidden>
        <label>Naujas slaptažodis<input type="password" name="password" autocomplete="new-password" minlength="12" required aria-describedby="password-update-help"></label>
        <p id="password-update-help" class="editor-note">Bent 12 simbolių. Naudokite unikalų slaptažodį, kurio nenaudojate kitur.</p>
        <label>Pakartokite slaptažodį<input type="password" name="password_confirm" autocomplete="new-password" minlength="12" required></label>
        <button class="button" type="submit">Išsaugoti naują slaptažodį</button>
      </form>

      <p class="form-status" id="password-status" role="status" aria-live="polite"></p>
      <p class="auth-switch"><a href="prisijungti.html">Grįžti į prisijungimą</a></p>
    </section>
  </main>
</div>
<script src="assets/supabase-config.js?v=20260618"></script>
<script src="assets/password-reset.js?v=20260708-1"></script>
<script src="assets/loading.js?v=20260707-1"></script>
</body>
</html>
